version: '3.8'

services:
  # REST API Service
  contextflow-api:
    build: .
    image: contextflow:4.0.0
    container_name: contextflow-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
      - ./temp:/app/temp
    environment:
      - PYTHONUNBUFFERED=1
      - CONTEXTFLOW_TEMP=/app/temp
      - CONTEXTFLOW_LOGS=/app/logs
      - API_WORKERS=4
    command: python api/main.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - contextflow-network

  # CLI Tool
  contextflow-cli:
    build: .
    image: contextflow:4.0.0
    container_name: contextflow-cli
    volumes:
      - ./data:/data
      - ./examples:/examples
      - ./output:/output
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: ["contextflow"]
    command: ["--help"]
    networks:
      - contextflow-network

  # Benchmark Service
  contextflow-benchmark:
    build: .
    image: contextflow:4.0.0
    container_name: contextflow-benchmark
    volumes:
      - ./benchmark_results:/results
    command: python -m contextflow.benchmarks.benchmark_suite
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - contextflow-network

networks:
  contextflow-network:
    driver: bridge